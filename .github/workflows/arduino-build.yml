name: Arduino build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "USB Host Shield Library 2.0" "GFX Library for Arduino" AppleMIDI

      - name: Compile ESP32-S3 USB host bridge
        run: |
          arduino-cli compile \
            --output-dir dist/s3 \
            --fqbn 'esp32:esp32:esp32s3usbotg:PartitionScheme=default_8MB,USBMode=hwcdc' \
            ./firmware/bridge-s3

      - name: Build GitHub Pages web flasher
        env:
          VERSION: ${{ github.sha }}
          BUILD_PATH: dist/s3
        run: ./scripts/build-web-flasher.sh

      - name: Validate web flasher assets
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          site = Path("site")
          manifest = json.loads((site / "manifest.json").read_text())
          assert manifest["builds"][0]["chipFamily"] == "ESP32-S3"
          part = manifest["builds"][0]["parts"][0]
          assert part["offset"] == 0
          firmware = site / part["path"]
          assert firmware.is_file(), firmware
          assert firmware.stat().st_size == 8 * 1024 * 1024, firmware.stat().st_size
          assert (site / "index.html").is_file()
          PY

      - name: Upload S3 firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-s3-esp32s3
          path: |
            dist/s3/bridge-s3.ino.bin
            dist/s3/bridge-s3.ino.bootloader.bin
            dist/s3/bridge-s3.ino.partitions.bin
            site/firmware/bridge-s3-esp32s3-usb-otg.bin
          if-no-files-found: error

      - name: Compile classic ESP32 MAX3421E fallback
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            ./firmware/bridge-classic

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: compile
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
